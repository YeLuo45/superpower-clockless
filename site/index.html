<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>superpower-clockless</title>
  <style>
    :root { color-scheme: light; --ink: #1e241c; --bg: #f7f0df; --accent: #d25f2f; --line: #293927; }
    body { margin: 0; font-family: Georgia, 'Times New Roman', serif; color: var(--ink); background: radial-gradient(circle at 10% 10%, #ffe0b5, transparent 28%), linear-gradient(135deg, #f7f0df, #e3efd8); }
    main { min-height: 100vh; display: grid; place-items: center; padding: 32px; }
    .card { max-width: 880px; border: 2px solid var(--line); background: rgba(255,255,255,.68); box-shadow: 12px 12px 0 var(--line); padding: clamp(28px, 6vw, 72px); }
    h1 { font-size: clamp(44px, 8vw, 92px); line-height: .9; margin: 0 0 20px; letter-spacing: -0.06em; }
    p { font-size: 20px; line-height: 1.55; max-width: 720px; }
    code { background: #1e241c; color: #fff7e3; padding: 3px 7px; border-radius: 4px; }
    .agents { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
    .agents span { border: 1px solid var(--line); padding: 8px 12px; background: #fff7e3; }
    a { color: var(--accent); font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>superpower<br>clockless</h1>
      <p>将 ai-superpower API Engine 与 prj-proposals-manager 生命周期技能安装到 Hermes、OpenClaw、Cursor、Claude Code、Codex 等 Agent。</p>
      <p><code>superpower-clockless install hermes</code></p>
      <div class="agents"><span>Hermes</span><span>OpenClaw</span><span>Cursor</span><span>Claude Code</span><span>Codex</span></div>
      <p><a href="https://github.com/YeLuo45/superpower-clockless">GitHub Repo</a></p>
    </section>
  </main>
</body>
</html>
